services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-frigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frigoSecure2026}
      POSTGRES_DB: ${POSTGRES_DB:-frigo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frigo}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    entrypoint: []
    command: ["sh", "-c", "npx prisma migrate deploy || npx prisma db push --accept-data-loss || true; exec node server.js"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-frigo}:${POSTGRES_PASSWORD:-frigoSecure2026}@db:5432/${POSTGRES_DB:-frigo}?schema=public"
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-in-production}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-KAGABO}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
